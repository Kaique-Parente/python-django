<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Produto - {{ produto.nome }}</title>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen p-4">

    <div class="max-w-sm w-full bg-white rounded-3xl shadow-xl overflow-hidden border border-gray-100">

        <div class="bg-[#092e20] py-4 text-center">
            <span class="text-white text-xs uppercase tracking-widest font-bold">Detalhes do Produto</span>
        </div>

        <div class="p-8">
            <h1 class="text-3xl font-extrabold text-gray-800 mb-2 tracking-tight">
                {{ produto.nome }}
            </h1>

            <div class="flex items-baseline space-x-1 mb-6">
                <span class="text-2xl font-bold text-green-700">R$</span>
                <span class="text-4xl font-black text-gray-900">{{ produto.preco }}</span>
            </div>

            <div class="flex items-center space-x-2 mb-8">
                <div class="h-2.5 w-2.5 rounded-full {% if produto.estoque > 0 %}bg-green-500{% else %}bg-red-500{% endif %}"></div>
                <p class="text-sm font-medium text-gray-500 uppercase tracking-wide">
                    {% if produto.estoque > 0 %}
                        Em estoque: <span class="text-gray-800">{{ produto.estoque }} unidades</span>
                    {% else %}
                        Produto Indisponível
                    {% endif %}
                </p>
            </div>

            <button class="w-full bg-[#092e20] hover:bg-green-900 text-white font-bold py-4 rounded-2xl transition-all transform hover:scale-[1.02] active:scale-95 shadow-lg">
                Adicionar ao Carrinho
            </button>

            <a href="/" class="block text-center mt-6 text-sm font-semibold text-gray-400 hover:text-[#092e20] transition">
                ← Voltar para a loja
            </a>
        </div>
    </div>

</body>
</html>
