<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Meu Segundo Projeto | Django</title>
</head>
<body class="bg-gray-50 font-sans">
    <nav class="bg-white border-b border-gray-100 py-4 sticky top-0 z-50">
        <div class="container mx-auto px-6 flex justify-between items-center">
            <h1 class="text-2xl font-black text-[#092e20]">django<span class="text-green-500">v2</span></h1>
            <div class="space-x-8 font-medium text-gray-600">
                <a href="/" class="hover:text-[#092e20] transition">Início</a>
                <a href="/contato" class="hover:text-[#092e20] transition">Contato</a>
            </div>
        </div>
    </nav>

    <header class="bg-[#092e20] text-white py-20 px-6">
        <div class="container mx-auto text-center">
            <h2 class="text-5xl font-bold mb-4">Evoluindo no Backend</h2>
            <p class="text-green-100 text-lg max-w-xl mx-auto opacity-80">
                Este é o meu segundo projeto prático. Aqui eu foco em formulários e envio de e-mails.
            </p>
        </div>
    </header>

    <main class="container mx-auto px-6 py-16">
        <h3 class="text-2xl font-bold text-gray-800 mb-8">Destaques</h3>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            {% for produto in produtos %}
            <div class="bg-white rounded-2xl shadow-sm hover:shadow-xl transition p-6 border border-gray-100 group">
                <div class="w-12 h-12 bg-green-100 rounded-lg flex items-center justify-center mb-4 group-hover:bg-[#092e20] transition">
                    <span class="text-2xl text-green-700 group-hover:text-white italic font-bold">D</span>
                </div>
                <h4 class="text-xl font-bold text-gray-900 mb-2">{{ produto.nome }}</h4>
                <p class="text-gray-500 text-sm mb-4">Preço: <span class="font-bold text-gray-800">R$ {{ produto.preco }}</span></p>
                <a href="{% url 'produto' produto.id %}" class="inline-block text-green-700 font-bold hover:underline">Ver Detalhes →</a>
            </div>
            {% endfor %}
        </div>
    </main>
</body>
</html>
