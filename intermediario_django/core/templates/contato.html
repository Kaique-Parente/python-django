<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Contato | Django V2</title>
</head>
<body class="bg-gray-50">
    <div class="container mx-auto px-6 py-20">
        <div class="max-w-4xl mx-auto bg-white rounded-3xl shadow-2xl overflow-hidden flex flex-col md:flex-row">
            <div class="bg-[#092e20] p-12 text-white md:w-1/3">
                <h2 class="text-3xl font-bold mb-6">Fale Conosco</h2>
                <p class="text-green-100 mb-8 opacity-70">Dúvidas sobre o projeto ou sugestões de melhoria?</p>
                <div class="space-y-4 text-sm">
                    <p>📍 São Paulo, Brasil</p>
                    <p>📧 dev@exemplo.com</p>
                </div>
            </div>
            <div class="p-12 md:w-2/3">
                <form action="#" method="POST" class="space-y-5">
                    {% csrf_token %}
                    <div>
                        <label for="nome" class="block text-gray-700 text-sm font-bold mb-2">Seu Nome</label>
                        <input id="nome" type="text" class="w-full p-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-green-500 outline-none">
                    </div>

                    <div>
                        <label for="email" class="block text-gray-700 text-sm font-bold mb-2">E-mail</label>
                        <input id="email" type="text" class="w-full p-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-green-500 outline-none">
                    </div>

                    <div>
                        <label for="mensagem" class="block text-gray-700 text-sm font-bold mb-2">Mensagem</label>
                        <textarea id="mensagem" rows="4" class="w-full p-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-green-500 outline-none"></textarea>
                    </div>

                    <button class="w-full bg-[#092e20] text-white py-4 rounded-xl font-bold hover:bg-green-900 transition">Enviar Agora</button>
                    <a href="/" class="block text-center text-sm text-gray-400 hover:text-gray-600">Voltar para Início</a>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
