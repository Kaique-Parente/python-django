{% load static %}

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Cadastrar Produto | Django V2</title>
</head>
<body class="bg-slate-50 min-h-screen p-6">
    {% if messages %}
        {% for message in messages %}
            <div
                class="flex items-center justify-between w-full p-4 mb-4 rounded-lg shadow-sm
                {% if message.tags == 'success' %}
                    text-green-800 border-t-4 border-green-300 bg-green-200
                {% elif message.tags == 'error' %}
                    text-red-800 border-t-4 border-red-300 bg-red-200
                {% endif %}"
                role="alert"
            >

                <svg class="flex-shrink-0 w-5 h-5" fill="currentColor" viewBox="0 0 20 20">
                    {% if message.tags == 'success' %}
                        <!-- check -->
                        <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"></path>
                    {% else %}
                        <!-- error -->
                        <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm-1-4h2v2H9v-2zm0-8h2v6H9V6z" clip-rule="evenodd"></path>
                    {% endif %}
                </svg>

                <div class="flex items-center">
                    <div class="ml-3 text-sm font-medium">
                        {{ message }}
                    </div>
                </div>

                <button onclick="this.parentElement.remove()" class="ml-4 text-lg font-bold">
                    &times;
                </button>
            </div>
        {% endfor %}
    {% endif %}

    <div class="flex items-center justify-center mt-12">
        <div class="max-w-2xl w-full bg-white rounded-3xl shadow-xl border border-gray-100 overflow-hidden">

        <div class="bg-[#092e20] p-6 text-center">
            <h2 class="text-white text-2xl font-bold italic">django</h2>
            <p class="text-green-200 text-xs uppercase tracking-widest mt-1">Novo Cadastro de Produto</p>
        </div>

        <form action="{% url 'cadastrar_produto' %}" method="POST" autocomplete="off" enctype="multipart/form-data" class="p-8 space-y-6">
            {% csrf_token %}

            <div>
                <label for="id_nome" class="block text-sm font-bold text-gray-700 mb-2">Nome do Produto</label>
                <input type="text"
                       name="nome"
                       id="id_nome"
                       placeholder="Ex: Teclado Mecânico"
                       class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-green-600 focus:border-transparent outline-none transition"
                       required>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label for="id_preco" class="block text-sm font-bold text-gray-700 mb-2">Preço (R$)</label>
                    <input type="number"
                           step="0.01"
                           name="preco"
                           id="id_preco"
                           placeholder="0,00"
                           class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-green-600 outline-none transition"
                           required>
                </div>

                <div>
                    <label for="id_estoque" class="block text-sm font-bold text-gray-700 mb-2">Quantidade em Estoque</label>
                    <input type="number"
                           name="estoque"
                           id="id_estoque"
                           placeholder="Ex: 50"
                           class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-green-600 outline-none transition"
                           required>
                </div>
            </div>

            <label class="block text-sm font-bold text-gray-700 mb-2">Imagem do Produto</label>

            <div class="flex items-center justify-center w-full">
                <label for="id_imagem" class="flex flex-col items-center justify-center w-full h-32 border-2 border-dashed border-gray-300 rounded-xl cursor-pointer bg-gray-50 hover:bg-green-50 hover:border-green-400 transition">
                    <div class="flex flex-col items-center justify-center pt-5 pb-6">
                        <svg id="upload-icon" class="w-8 h-8 mb-3 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path>
                        </svg>

                        <p id="file-name" class="text-sm text-gray-500 font-medium px-4 text-center">
                            Clique para fazer o upload
                        </p>
                        <p id="file-size" class="text-xs text-gray-400 mt-1 hidden"></p>
                    </div>

                    <input type="file"
                           name="imagem"
                           id="id_imagem"
                           accept="image/*"
                           class="hidden"
                           onchange="updateFileName(this)">
                </label>
            </div>

            <div class="pt-4 flex flex-col space-y-3">
                <button type="submit" class="w-full bg-[#092e20] text-white py-4 rounded-xl font-bold shadow-lg hover:bg-green-900 transition transform active:scale-95">
                    Salvar Produto
                </button>
                <a href="/" class="text-center text-sm font-semibold text-gray-400 hover:text-gray-600 transition">
                    Cancelar e Voltar
                </a>
            </div>
        </form>
    </div>
    </div>

    <script src="{% static 'js/script.js' %}"></script>
</body>
</html>
